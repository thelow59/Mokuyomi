<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- Book spine -->
  <rect x="246" y="100" width="20" height="280" rx="3" fill="#d97706"/>

  <!-- Left page -->
  <path d="M130 120 L246 110 L246 380 L130 370 Q100 368 100 340 L100 150 Q100 122 130 120Z" fill="url(#page)" stroke="#d97706" stroke-width="3"/>
  <!-- Left page text lines -->
  <line x1="125" y1="160" x2="225" y2="156" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="123" y1="185" x2="220" y2="181" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="121" y1="210" x2="215" y2="206" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="119" y1="235" x2="225" y2="231" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="117" y1="260" x2="210" y2="256" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>

  <!-- Right page -->
  <path d="M266 110 L382 120 Q412 122 412 150 L412 340 Q412 368 382 370 L266 380Z" fill="url(#page)" stroke="#d97706" stroke-width="3"/>
  <!-- Right page text lines -->
  <line x1="287" y1="156" x2="387" y2="160" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="292" y1="181" x2="389" y2="185" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="297" y1="206" x2="391" y2="210" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="287" y1="231" x2="393" y2="235" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
  <line x1="302" y1="256" x2="395" y2="260" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>

  <!-- Right page vertical text (manga-style) -->
  <line x1="365" y1="150" x2="365" y2="345" stroke="#d4a373" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="355" y1="155" x2="355" y2="340" stroke="#d4a373" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Speech bubble -->
  <path d="M200 300 Q200 260 250 258 L320 260 Q370 262 370 300 L370 340 Q370 378 320 380 L280 380 L255 410 L260 380 L250 378 Q200 376 200 340Z" fill="url(#bubble)" stroke="#94a3b8" stroke-width="3"/>

  <!-- Speech bubble text mark -->
  <circle cx="280" cy="305" r="6" fill="#334155"/>
  <circle cx="310" cy="305" r="6" fill="#334155"/>
  <circle cx="295" cy="335" r="6" fill="#334155"/>

  <!-- Small manga-style accent marks -->
  <path d="M150 100 L140 80 L160 90Z" fill="#ef4444" opacity="0.7"/>
  <path d="M370 95 L380 75 L360 85Z" fill="#ef4444" opacity="0.7"/>
</svg>
